<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>接水果</title>
<style>
  :root { --bg: #0f172a; --panel: #1e293b; --text: #e2e8f0; --muted: #94a3b8; --accent: #38bdf8; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 14px; background: radial-gradient(ellipse at top, #1e293b, var(--bg));
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Segoe UI", sans-serif;
    color: var(--text); padding: 20px;
  }
  h1 {
    font-size: 26px; letter-spacing: 6px;
    background: linear-gradient(90deg, #4ade80, #fbbf24);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  a.back { color: var(--muted); font-size: 13px; text-decoration: none; }
  a.back:hover { color: var(--accent); }
  .hud { display: flex; gap: 12px; width: min(480px, 92vw); }
  .card { flex: 1; background: var(--panel); border-radius: 12px; padding: 8px 14px; text-align: center; border: 1px solid rgba(255,255,255,0.06); }
  .card .label { font-size: 12px; color: var(--muted); }
  .card .value { font-size: 20px; font-weight: 700; font-variant-numeric: tabular-nums; }
  #score .value { color: #4ade80; } #best .value { color: var(--accent); } #lives .value { color: #f87171; }
  .stage { position: relative; width: min(480px, 92vw); }
  canvas {
    display: block; width: 100%; border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .overlay {
    position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 14px; background: rgba(15,23,42,0.82); backdrop-filter: blur(4px); border-radius: 16px;
    text-align: center; transition: opacity .25s;
  }
  .overlay.hidden { opacity: 0; pointer-events: none; }
  .overlay h2 { font-size: 26px; }
  .overlay p { color: var(--muted); font-size: 14px; line-height: 1.9; }
  button {
    padding: 12px 36px; font-size: 16px; font-weight: 700; color: #14532d;
    background: linear-gradient(135deg, #4ade80, #fbbf24); border: none; border-radius: 999px;
    cursor: pointer; transition: transform .15s;
  }
  button:hover { transform: translateY(-2px); }
  .tips { color: var(--muted); font-size: 13px; }
  kbd { background: var(--panel); border: 1px solid rgba(255,255,255,0.15); border-radius: 5px; padding: 1px 7px; font-size: 12px; font-family: inherit; }
</style>
</head>
<body>

<h1>接水果</h1>
<a class="back" href="index.html">← 返回游戏合集</a>

<div class="hud">
  <div class="card" id="score"><div class="label">得分</div><div class="value">0</div></div>
  <div class="card" id="best"><div class="label">最高分</div><div class="value">0</div></div>
  <div class="card" id="lives"><div class="label">生命</div><div class="value">❤❤❤</div></div>
</div>

<div class="stage">
  <canvas id="game" width="480" height="560"></canvas>
  <div class="overlay" id="overlay">
    <h2 id="ovTitle">接水果</h2>
    <p id="ovText">左右移动篮子接住水果<br>⭐ +50 分 · 💣 千万别接!漏接水果扣生命</p>
    <button id="startBtn">开始游戏</button>
  </div>
</div>

<p class="tips">鼠标 / <kbd>←</kbd><kbd>→</kbd> 移动 · 手机触摸拖动</p>

<script>
(() => {
  const W = 480, H = 560;
  const canvas = document.getElementById('game'), ctx = canvas.getContext('2d');
  const overlay = document.getElementById('overlay');
  const ovTitle = document.getElementById('ovTitle'), ovText = document.getElementById('ovText');
  const startBtn = document.getElementById('startBtn');
  const scoreV = document.querySelector('#score .value');
  const bestV = document.querySelector('#best .value');
  const livesV = document.querySelector('#lives .value');

  const FRUITS = ['🍎','🍌','🍇','🍉','🍓','🍑','🍍','🥝'];

  let basket, items, popups, score, best, lives, running, rafId, spawnTimer, elapsed;
  let keys = {};

  best = Number(localStorage.getItem('catch-best') || 0);
  bestV.textContent = best;

  function reset() {
    basket = { x: W / 2, w: 90, h: 22 };
    items = []; popups = [];
    score = 0; lives = 3; spawnTimer = 0; elapsed = 0;
    updateHud();
  }

  function updateHud() {
    scoreV.textContent = score;
    bestV.textContent = best;
    livesV.textContent = '❤'.repeat(Math.max(0, lives)) || '💔';
  }

  function difficulty() {
    // 随时间增加下落速度与生成频率
    return Math.min(1 + elapsed / 30, 3);
  }

  function spawn() {
    const d = difficulty();
    const isBomb = Math.random() < 0.16;
    const isStar = !isBomb && Math.random() < 0.08;
    items.push({
      x: 30 + Math.random() * (W - 60),
      y: -30,
      vy: (2 + Math.random() * 1.5) * d * 0.8,
      rot: Math.random() * Math.PI * 2,
      vr: (Math.random() - 0.5) * 0.1,
      type: isBomb ? 'bomb' : isStar ? 'star' : 'fruit',
      emoji: isBomb ? '💣' : isStar ? '⭐' : FRUITS[(Math.random() * FRUITS.length) | 0],
    });
  }

  function update(dt) {
    elapsed += dt;
    if (keys.ArrowLeft) basket.x -= 9;
    if (keys.ArrowRight) basket.x += 9;
    basket.x = Math.max(basket.w / 2, Math.min(W - basket.w / 2, basket.x));

    spawnTimer -= dt;
    if (spawnTimer <= 0) {
      spawn();
      spawnTimer = Math.max(0.28, 0.9 / difficulty());
    }

    const basketTop = H - 54;
    for (let i = items.length - 1; i >= 0; i--) {
      const it = items[i];
      it.y += it.vy;
      it.rot += it.vr;

      // 接住判定
      if (it.y > basketTop - 8 && it.y < basketTop + 22 &&
          Math.abs(it.x - basket.x) < basket.w / 2 + 12) {
        if (it.type === 'bomb') {
          lives--;
          popups.push({ x: it.x, y: basketTop, text: '💥', life: 1 });
        } else {
          const pts = it.type === 'star' ? 50 : 10;
          score += pts;
          if (score > best) { best = score; localStorage.setItem('catch-best', best); }
          popups.push({ x: it.x, y: basketTop, text: '+' + pts, life: 1 });
        }
        items.splice(i, 1);
        updateHud();
        if (lives <= 0) return gameOver();
        continue;
      }

      // 落地
      if (it.y > H + 30) {
        if (it.type === 'fruit' || it.type === 'star') {
          lives--;
          popups.push({ x: it.x, y: H - 40, text: '💔', life: 1 });
          updateHud();
          if (lives <= 0) return gameOver();
        }
        items.splice(i, 1);
      }
    }

    popups.forEach(p => { p.y -= 1; p.life -= 0.02; });
    popups = popups.filter(p => p.life > 0);
  }

  function draw() {
    // 背景
    const sky = ctx.createLinearGradient(0, 0, 0, H);
    sky.addColorStop(0, '#132043'); sky.addColorStop(1, '#1d2c52');
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, W, H);

    // 地面
    ctx.fillStyle = '#14532d';
    ctx.fillRect(0, H - 18, W, 18);

    // 掉落物
    items.forEach(it => {
      ctx.save();
      ctx.translate(it.x, it.y);
      ctx.rotate(it.rot);
      ctx.font = '32px serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(it.emoji, 0, 0);
      ctx.restore();
    });

    // 篮子
    const bx = basket.x, by = H - 54;
    ctx.fillStyle = '#b45309';
    ctx.beginPath();
    ctx.moveTo(bx - basket.w / 2, by);
    ctx.lineTo(bx + basket.w / 2, by);
    ctx.lineTo(bx + basket.w / 2 - 12, by + 30);
    ctx.lineTo(bx - basket.w / 2 + 12, by + 30);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#fbbf24';
    ctx.lineWidth = 2;
    for (let i = -2; i <= 2; i++) {
      ctx.beginPath();
      ctx.moveTo(bx + i * basket.w / 6, by);
      ctx.lineTo(bx + i * (basket.w - 24) / 6, by + 30);
      ctx.stroke();
    }
    ctx.beginPath();
    ctx.moveTo(bx - basket.w / 2, by);
    ctx.lineTo(bx + basket.w / 2, by);
    ctx.stroke();

    // 飘字
    popups.forEach(p => {
      ctx.globalAlpha = p.life;
      ctx.font = 'bold 20px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillStyle = '#fbbf24';
      ctx.fillText(p.text, p.x, p.y);
      ctx.globalAlpha = 1;
    });
  }

  let lastT = 0;
  function loop(t) {
    rafId = requestAnimationFrame(loop);
    const dt = Math.min(0.05, (t - lastT) / 1000);
    lastT = t;
    if (!running) return;
    update(dt);
    if (running) draw();
  }

  function start() {
    reset();
    running = true;
    overlay.classList.add('hidden');
    lastT = performance.now();
    cancelAnimationFrame(rafId);
    rafId = requestAnimationFrame(loop);
  }

  function gameOver() {
    running = false;
    ovTitle.textContent = '游戏结束';
    ovText.innerHTML = `本局得分 <b style="color:#4ade80">${score}</b> · 最高分 <b style="color:#38bdf8">${best}</b>`;
    startBtn.textContent = '再来一局';
    overlay.classList.remove('hidden');
  }

  function scaleX(clientX) {
    const rect = canvas.getBoundingClientRect();
    return (clientX - rect.left) * (W / rect.width);
  }
  canvas.addEventListener('mousemove', (e) => { if (running) basket.x = scaleX(e.clientX); });
  canvas.addEventListener('touchmove', (e) => { if (running) basket.x = scaleX(e.touches[0].clientX); }, { passive: true });

  document.addEventListener('keydown', (e) => { keys[e.key] = true; });
  document.addEventListener('keyup', (e) => { keys[e.key] = false; });

  startBtn.addEventListener('click', start);
})();
</script>
</body>
</html>
